$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Label Value
description: A label and value pair, with an optional link on the value
props:
  type: object
  required:
    - label
    - value
  properties:
    label:
      title: Label
      type: string
      examples:
        - Genre
    value:
      title: Value
      type: string
      examples:
        - Drama
    link:
      title: Link
      description: Optional URL to wrap the value in an anchor tag
      type: string
      format: uri-reference
      examples:
        - /genre/drama
