$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Label Slot Value
description: A label prop and value slot pair
props:
  type: object
  required:
    - label
  properties:
    label:
      title: Label
      type: string
      examples:
        - Genre
slots:
  value:
    title: Value
    description: The value content to display after the label
    examples:
      - Drama
