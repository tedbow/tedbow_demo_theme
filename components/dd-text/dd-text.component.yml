$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Text
group: Demo
props:
  type: object
  properties:
    text:
      type: string
      title: Rich text
      contentMediaType: text/html
      x-formatting-context: block
      examples:
        - <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Tristique pretium pellentesque semper enim aliquam.</p>
    text_size:
      type: string
      title: Text size
      enum:
        - xs
        - sm
        - normal
        - lg
        - xl
        - 2xl
        - 3xl
      meta:enum:
        xs: 12px
        sm: 14px
        normal: 16px (default)
        lg: 18px
        xl: 20px
        2xl: 24px
        3xl: 32px
      default: normal
      examples:
        - normal
